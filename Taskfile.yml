version: '3'

# Root Taskfile - for building the base image only

vars:
  DEFAULT_DEBIAN: bookworm

tasks:
  build:
    desc: Build the hdae/ai-base Docker image (tagged :bookworm and :latest)
    cmds:
      - docker build
          -t hdae/ai-base:{{.DEFAULT_DEBIAN}}
          -t hdae/ai-base:latest
          ./base

  build.debian:
    desc: Build with specific Debian version (tagged :<version>)
    cmds:
      - docker build
          --build-arg DEBIAN_VERSION={{.DEBIAN_VERSION}}
          -t hdae/ai-base:{{.DEBIAN_VERSION}}
          ./base
    vars:
      DEBIAN_VERSION: '{{.DEBIAN_VERSION | default "bookworm"}}'

  create-volume:
    desc: Create shared uv-cache volume
    cmds:
      - docker volume create shared_uv-cache || true
    status:
      - docker volume inspect shared_uv-cache
